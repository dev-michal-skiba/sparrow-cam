---
- name: Deploy Archive API Service
  hosts: all
  become: yes
  vars:
    archive_api_python_version: "3.13.3"

  tasks:
    - name: Update apt cache
      include_tasks: tasks/apt_update.yml

    - name: Setup pyenv and virtualenv for sparrow_cam_app (archive_api)
      include_tasks: tasks/pyenv_setup.yml
      vars:
        python_version: "{{ archive_api_python_version }}"
        virtualenv_name: sparrow_cam_archive_api
        app_user: sparrow_cam_app
        app_home: /opt/sparrow_cam_app

    - name: Clone sparrow_cam repo with sparse checkout for app/archive_api
      shell: |
        if [ ! -d /opt/sparrow_cam_app/source/.git ]; then
          git clone --no-checkout --filter=blob:none https://github.com/dev-michal-skiba/sparrow-cam.git /opt/sparrow_cam_app/source
        fi
        git -C /opt/sparrow_cam_app/source sparse-checkout init --cone
        git -C /opt/sparrow_cam_app/source sparse-checkout add app/archive_api
        git -C /opt/sparrow_cam_app/source pull origin master
        git -C /opt/sparrow_cam_app/source checkout master
      args:
        executable: /bin/bash
      become_user: sparrow_cam_app
      environment:
        HOME: /opt/sparrow_cam_app
      notify: reload and restart archive_api

    - name: Install archive API app with dependencies
      shell: |
        source ~/.pyenvrc
        pyenv activate sparrow_cam_archive_api
        pip install --upgrade pip setuptools wheel
        pip install -e /opt/sparrow_cam_app/source/app/archive_api
      args:
        executable: /bin/bash
      become: yes
      become_user: sparrow_cam_app
      environment:
        HOME: /opt/sparrow_cam_app
        PYENV_ROOT: /opt/sparrow_cam_app/.pyenv
      notify: reload and restart archive_api

    - name: Create archive API systemd service file
      copy:
        content: |
          [Unit]
          Description=SparrowCam Archive API
          After=network.target nginx.service
          Wants=nginx.service

          [Service]
          Type=simple
          User=sparrow_cam_app
          Group=sparrow_cam_app
          WorkingDirectory=/opt/sparrow_cam_app/source/app/archive_api
          Environment="PATH=/opt/sparrow_cam_app/.pyenv/versions/sparrow_cam_archive_api/bin:/opt/sparrow_cam_app/.pyenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="HOME=/opt/sparrow_cam_app"
          Environment="PYENV_ROOT=/opt/sparrow_cam_app/.pyenv"
          Environment="PYTHONUNBUFFERED=1"
          Environment="FLASK_HOST=127.0.0.1"
          ExecStart=/opt/sparrow_cam_app/.pyenv/versions/sparrow_cam_archive_api/bin/python -m archive_api
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=sparrow-archive-api

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/sparrow-archive-api.service
        owner: root
        group: root
        mode: '0644'
      notify: reload and restart archive_api

    - name: Enable archive API service to start on boot
      systemd:
        name: sparrow-archive-api
        enabled: yes
        daemon_reload: yes

    - name: Start archive API service
      systemd:
        name: sparrow-archive-api
        state: started
        daemon_reload: yes

  handlers:
    - name: reload and restart archive_api
      systemd:
        name: sparrow-archive-api
        state: restarted
        daemon_reload: yes
