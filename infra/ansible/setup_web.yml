---
- name: Deploy Web Server (Nginx)
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      include_tasks: tasks/apt_update.yml

    - name: Install nginx
      apt:
        name:
          - nginx
          - ufw
        state: present

    - name: Allow SSH through firewall
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: 'SSH access'

    - name: Allow HTTP through firewall
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp
        comment: 'HTTP web access'

    - name: Enable UFW firewall
      community.general.ufw:
        state: enabled

    - name: Create HLS directory
      file:
        path: /var/www/html/hls
        state: directory
        owner: sparrow_cam_stream
        group: sparrow_cam
        mode: '0775'

    - name: Copy nginx configuration
      copy:
        src: /app/nginx.conf
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart nginx

    - name: Set production WEB port
      replace:
        path: /etc/nginx/nginx.conf
        regexp: '\$\{WEB_PORT\}'
        replace: "{{ WEB_PORT }}"
      vars:
        WEB_PORT: 80
      notify: restart nginx

    - name: Set archive API URL
      replace:
        path: /etc/nginx/nginx.conf
        regexp: '\$\{ARCHIVE_API_URL\}'
        replace: "http://127.0.0.1:5001"
      notify: restart nginx

    - name: Copy web app build output
      copy:
        src: /app/web/dist/
        dest: /var/www/html/
        owner: root
        group: sparrow_cam
        mode: '0644'
        directory_mode: '0755'

    - name: Validate nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Enable nginx service
      systemd:
        name: nginx
        enabled: yes
        state: started

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
