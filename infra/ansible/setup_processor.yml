---
- name: Deploy Processor Service
  hosts: all
  become: yes
  vars:
    processor_python_version: "3.11.13"

  tasks:
    - name: Update apt cache
      include_tasks: tasks/apt_update.yml

    - name: Setup pyenv and virtualenv for sparrow_cam_app (processor)
      include_tasks: tasks/pyenv_setup.yml
      vars:
        python_version: "{{ processor_python_version }}"
        virtualenv_name: sparrow_cam_processor
        app_user: sparrow_cam_app
        app_home: /opt/sparrow_cam_app

    - name: Create annotations directory
      file:
        path: /var/www/html/annotations
        state: directory
        owner: sparrow_cam_app
        group: sparrow_cam
        mode: '0775'

    - name: Create stream archive storage directory
      file:
        path: /var/www/html/storage/sparrow_cam/archive
        state: directory
        owner: sparrow_cam_app
        group: sparrow_cam
        mode: '0775'

    - name: Clone sparrow_cam repo with sparse checkout for app/processor
      shell: |
        if [ ! -d /opt/sparrow_cam_app/source/.git ]; then
          git clone --no-checkout --filter=blob:none https://github.com/dev-michal-skiba/sparrow-cam.git /opt/sparrow_cam_app/source
        fi
        git -C /opt/sparrow_cam_app/source sparse-checkout init --cone
        git -C /opt/sparrow_cam_app/source sparse-checkout add app/processor
        git -C /opt/sparrow_cam_app/source pull origin master
        git -C /opt/sparrow_cam_app/source checkout master
      args:
        executable: /bin/bash
      become_user: sparrow_cam_app
      environment:
        HOME: /opt/sparrow_cam_app
      notify: reload and restart processor

    - name: Install processor app with dependencies
      shell: |
        source ~/.pyenvrc
        pyenv activate sparrow_cam_processor
        pip install --upgrade pip setuptools wheel
        pip install -e /opt/sparrow_cam_app/source/app/processor
      args:
        executable: /bin/bash
      become: yes
      become_user: sparrow_cam_app
      environment:
        HOME: /opt/sparrow_cam_app
        PYENV_ROOT: /opt/sparrow_cam_app/.pyenv
      notify: reload and restart processor

    - name: Create processor systemd service file
      copy:
        content: |
          [Unit]
          Description=SparrowCam HLS Segment Processor
          After=network.target nginx.service
          Wants=nginx.service

          [Service]
          Type=simple
          User=sparrow_cam_app
          Group=sparrow_cam_app
          WorkingDirectory=/opt/sparrow_cam_app/source/app/processor
          Environment="PATH=/opt/sparrow_cam_app/.pyenv/versions/sparrow_cam_processor/bin:/opt/sparrow_cam_app/.pyenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="HOME=/opt/sparrow_cam_app"
          Environment="PYENV_ROOT=/opt/sparrow_cam_app/.pyenv"
          Environment="PYTHONUNBUFFERED=1"
          ExecStart=/opt/sparrow_cam_app/.pyenv/versions/sparrow_cam_processor/bin/python -m processor
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=sparrow-processor

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/sparrow-processor.service
        owner: root
        group: root
        mode: '0644'
      notify: reload and restart processor

    - name: Enable processor service to start on boot
      systemd:
        name: sparrow-processor
        enabled: yes
        daemon_reload: yes

    - name: Start processor service
      systemd:
        name: sparrow-processor
        state: started
        daemon_reload: yes

  handlers:
    - name: reload and restart processor
      systemd:
        name: sparrow-processor
        state: restarted
        daemon_reload: yes
